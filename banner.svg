<svg width="900" height="130" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* DRAW animation - stroke reveal */
    @keyframes draw {
      0%   { stroke-dashoffset: 1200; opacity: 1; fill-opacity: 0; }
      40%  { stroke-dashoffset: 0;    opacity: 1; fill-opacity: 0; }
      60%  { stroke-dashoffset: 0;    opacity: 1; fill-opacity: 1; }
      90%  { stroke-dashoffset: 0;    opacity: 1; fill-opacity: 1; }
      100% { stroke-dashoffset: 0;    opacity: 0; fill-opacity: 0; }
    }

    /* FLICKER animation - neon light */
    @keyframes flicker {
      0%   { opacity: 0; }
      5%   { opacity: 0; }
      6%   { opacity: 0.9; }
      8%   { opacity: 0.1; }
      10%  { opacity: 1; }
      12%  { opacity: 0.2; }
      14%  { opacity: 0.95; }
      16%  { opacity: 0.3; }
      18%  { opacity: 1; }
      20%  { opacity: 0.8; }
      25%  { opacity: 1; }
      80%  { opacity: 1; }
      90%  { opacity: 0.9; }
      95%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* FLOAT animation - gentle up down */
    @keyframes float {
      0%   { transform: translateY(0px);   opacity: 0; }
      5%   { opacity: 1; }
      25%  { transform: translateY(-8px);  opacity: 1; }
      50%  { transform: translateY(0px);   opacity: 1; }
      75%  { transform: translateY(-8px);  opacity: 1; }
      95% { opacity: 1; }
      100% { transform: translateY(0px);   opacity: 0; }
    }

    /* Particle float */
    @keyframes particle-rise {
      0%   { transform: translateY(0);   opacity: 0; }
      20%  { opacity: 0.7; }
      80%  { opacity: 0.5; }
      100% { transform: translateY(-90px); opacity: 0; }
    }

    @keyframes pulse-line {
      0%, 100% { transform: scaleX(0); opacity: 0; }
      50%       { transform: scaleX(1); opacity: 0.5; }
    }

    @keyframes subtitle-pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }

    /* Phase 1: Draw (0-10s of 30s cycle) */
    .text-draw {
      fill: #ffffff;
      stroke: #cc2222;
      stroke-width: 1.5px;
      stroke-dasharray: 1200;
      font-family: monospace;
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 14px;
      animation: draw 10s ease-in-out 0s infinite;
      filter: drop-shadow(0 0 8px #cc0000) drop-shadow(0 0 16px #880000);
    }

    /* Phase 2: Flicker (10-20s) */
    .text-flicker {
      fill: #ffffff;
      font-family: monospace;
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 14px;
      animation: flicker 10s linear 10s infinite;
      filter: drop-shadow(0 0 12px #ff2222) drop-shadow(0 0 24px #cc0000) drop-shadow(0 0 4px #ffffff);
      opacity: 0;
    }

    /* Phase 3: Float (20-30s) */
    .text-float {
      fill: #ffffff;
      font-family: monospace;
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 14px;
      animation: float 10s ease-in-out 20s infinite;
      filter: drop-shadow(0 0 6px #cc0000) drop-shadow(0 0 12px #880000);
      opacity: 0;
    }

    .particle { animation: particle-rise linear infinite; }
    .p1 { animation-duration: 4s;   animation-delay: 0s; }
    .p2 { animation-duration: 5.5s; animation-delay: 1s; }
    .p3 { animation-duration: 3.8s; animation-delay: 2s; }
    .p4 { animation-duration: 6s;   animation-delay: 0.5s; }
    .p5 { animation-duration: 4.5s; animation-delay: 1.5s; }
    .p6 { animation-duration: 5s;   animation-delay: 3s; }
    .p7 { animation-duration: 4.2s; animation-delay: 2.5s; }
    .p8 { animation-duration: 6.5s; animation-delay: 0.8s; }

    .underline {
      transform-origin: center;
      animation: pulse-line 3s ease-in-out infinite;
    }

    .subtitle {
      animation: subtitle-pulse 3.5s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="130" fill="#0d0d0d"/>

  <!-- Particles -->
  <circle class="particle p1" cx="80"  cy="120" r="1.5" fill="#660000"/>
  <circle class="particle p2" cx="180" cy="120" r="1"   fill="#aa1111"/>
  <circle class="particle p3" cx="300" cy="120" r="2"   fill="#550000"/>
  <circle class="particle p4" cx="450" cy="120" r="1.5" fill="#880000"/>
  <circle class="particle p5" cx="580" cy="120" r="1"   fill="#aa1111"/>
  <circle class="particle p6" cx="680" cy="120" r="2"   fill="#660000"/>
  <circle class="particle p7" cx="780" cy="120" r="1.5" fill="#550000"/>
  <circle class="particle p8" cx="860" cy="120" r="1"   fill="#880000"/>

  <!-- Phase 1: DRAW text -->
  <text class="text-draw" x="450" y="78" text-anchor="middle">FIREKID</text>

  <!-- Phase 2: FLICKER text -->
  <text class="text-flicker" x="450" y="78" text-anchor="middle">FIREKID</text>

  <!-- Phase 3: FLOAT text -->
  <text class="text-float" x="450" y="78" text-anchor="middle">FIREKID</text>

  <!-- Underline bar -->
  <rect class="underline" x="225" y="92" width="450" height="1" fill="#cc2222"/>

  <!-- Subtitle -->
  <text class="subtitle" x="450" y="116" font-family="monospace" font-size="10"
    text-anchor="middle" fill="#662222" letter-spacing="5">
    BOT DEVELOPER · PACKAGE CREATOR · OPEN SOURCE
  </text>
</svg>
