<svg width="900" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="120" fill="#0d0d0d"/>

  <!-- Animated particles -->
  <circle cx="50" cy="30" r="1.5" fill="#444">
    <animate attributeName="cy" values="30;90;30" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="80" r="1" fill="#333">
    <animate attributeName="cy" values="80;20;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="40" r="2" fill="#555">
    <animate attributeName="cy" values="40;100;40" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="250;270;250" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="20" r="1.5" fill="#444">
    <animate attributeName="cy" values="20;95;20" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="60" r="1" fill="#666">
    <animate attributeName="cy" values="60;10;60" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="550;530;550" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="90" r="2" fill="#333">
    <animate attributeName="cy" values="90;30;90" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="50" r="1.5" fill="#555">
    <animate attributeName="cy" values="50;100;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="820;840;820" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="20" r="1" fill="#444">
    <animate attributeName="cy" values="20;80;20" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="1.5" fill="#333">
    <animate attributeName="cy" values="100;40;100" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="110" r="1" fill="#555">
    <animate attributeName="cy" values="110;50;110" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="600;580;600" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Horizontal scan line -->
  <rect width="900" height="1" fill="#ffffff" opacity="0.03">
    <animate attributeName="y" values="0;120;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.05;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Main FIREKID text with glitch effect -->
  <text x="450" y="68" font-family="monospace" font-size="52" font-weight="900" text-anchor="middle" fill="#ffffff" filter="url(#glow-filter)" letter-spacing="12">
    FIREKID
    <animate attributeName="x" values="450;452;449;450;451;450" dur="0.3s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.8;1;0.9;1" dur="0.3s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch red layer -->
  <text x="450" y="68" font-family="monospace" font-size="52" font-weight="900" text-anchor="middle" fill="#ff0000" opacity="0" letter-spacing="12">
    FIREKID
    <animate attributeName="x" values="447;453;447" dur="0.15s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0;0.3;0" dur="0.3s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch blue layer -->
  <text x="450" y="68" font-family="monospace" font-size="52" font-weight="900" text-anchor="middle" fill="#0088ff" opacity="0" letter-spacing="12">
    FIREKID
    <animate attributeName="x" values="453;447;453" dur="0.15s" begin="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0;0.2;0" dur="0.3s" begin="2.1s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom line animated -->
  <line x1="200" y1="90" x2="700" y2="90" stroke="#222" stroke-width="1">
    <animate attributeName="x1" values="450;200;450" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="450;700;450" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="108" font-family="monospace" font-size="11" text-anchor="middle" fill="#444" letter-spacing="6">
    BOT DEVELOPER · PACKAGE CREATOR · OPEN SOURCE
    <animate attributeName="opacity" values="0;1;0.7;1" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>
