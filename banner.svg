<svg width="900" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="text-mask">
      <text x="450" y="72" font-family="monospace" font-size="58" font-weight="900"
        text-anchor="middle" fill="white" letter-spacing="14">FIREKID</text>
    </mask>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="120" fill="#0d0d0d"/>

  <!-- Particles -->
  <circle cx="60" cy="25" r="1.5" fill="#1a3a6a" opacity="0">
    <animate attributeName="cy" values="25;95;25" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="90" r="1" fill="#2244aa" opacity="0">
    <animate attributeName="cy" values="90;15;90" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="6.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="40" r="2" fill="#0d2a5a" opacity="0">
    <animate attributeName="cy" values="40;100;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="300;320;300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="15" r="1.5" fill="#1a3a6a" opacity="0">
    <animate attributeName="cy" values="15;100;15" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="70" r="1" fill="#2244aa" opacity="0">
    <animate attributeName="cy" values="70;10;70" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="650;630;650" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="95" r="2" fill="#0d2a5a" opacity="0">
    <animate attributeName="cy" values="95;25;95" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="30" r="1.5" fill="#1a3a6a" opacity="0">
    <animate attributeName="cy" values="30;90;30" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="110" r="1" fill="#2244aa" opacity="0">
    <animate attributeName="cy" values="110;40;110" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- PHASE 1 (0-10s): DRAW — stroke-dashoffset reveal -->
  <text x="450" y="72" font-family="monospace" font-size="58" font-weight="900"
    text-anchor="middle" fill="none" stroke="#ffffff" stroke-width="1.5"
    letter-spacing="14" filter="url(#glow-filter)"
    stroke-dasharray="1200" stroke-dashoffset="1200">
    FIREKID
    <!-- Draw in over first 5s, hold, then fade out by 10s -->
    <animate attributeName="stroke-dashoffset" values="1200;0;0;0" dur="10s" keyTimes="0;0.5;0.9;1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="10s" keyTimes="0;0.5;0.9;1" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#ffffff;#aaccff;#ffffff;#ffffff" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- PHASE 2 (10-20s): FLICKER — neon flicker effect -->
  <text x="450" y="72" font-family="monospace" font-size="58" font-weight="900"
    text-anchor="middle" fill="#ffffff" letter-spacing="14" filter="url(#strong-glow)"
    opacity="0">
    FIREKID
    <!-- Start at 10s, flicker for 10s, fade out at 20s -->
    <animate attributeName="opacity"
      values="0;0;0.9;0.2;1;0.1;0.95;0.3;1;0.05;0.9;1;0.8;1;1;1;1;0"
      dur="30s"
      keyTimes="0;0.333;0.367;0.383;0.4;0.417;0.433;0.45;0.467;0.483;0.5;0.533;0.55;0.567;0.6;0.633;0.633;0.667"
      repeatCount="indefinite"/>
    <animate attributeName="fill"
      values="#ffffff;#ffffff;#aaccff;#ffffff;#cce0ff;#ffffff;#ffffff;#ffffff"
      dur="30s" repeatCount="indefinite"/>
  </text>

  <!-- PHASE 3 (20-30s): FLOAT — gentle up and down -->
  <text x="450" font-family="monospace" font-size="58" font-weight="900"
    text-anchor="middle" fill="#ffffff" letter-spacing="14" filter="url(#glow-filter)"
    opacity="0">
    FIREKID
    <animate attributeName="y" values="72;68;72;76;72" dur="10s" keyTimes="0;0.25;0.5;0.75;1" repeatCount="indefinite"/>
    <!-- Show only during float phase (20-30s of 30s cycle) -->
    <animate attributeName="opacity"
      values="0;0;0;1;1;1;0"
      dur="30s"
      keyTimes="0;0.6;0.667;0.7;0.9;0.967;1"
      repeatCount="indefinite"/>
  </text>

  <!-- Animated underline -->
  <line y1="90" y2="90" stroke="#1a3a6a" stroke-width="1">
    <animate attributeName="x1" values="450;180;450" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="450;720;450" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="110" font-family="monospace" font-size="10" text-anchor="middle"
    fill="#334466" letter-spacing="5">
    BOT DEVELOPER · PACKAGE CREATOR · OPEN SOURCE
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#334466;#445577;#334466" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
